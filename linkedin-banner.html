<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=JetBrains+Mono:wght@500;600&family=Manrope:wght@800&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1128px; height: 191px; }
  .banner {
    width: 1128px; height: 191px; background: #07070a; position: relative; overflow: hidden;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-family: 'Manrope', sans-serif; text-align: center;
  }
  .glow {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 50% 120% at 18% 50%, rgba(212,255,61,0.16), transparent 60%),
      radial-gradient(ellipse 45% 120% at 88% 50%, rgba(255,87,34,0.08), transparent 60%);
  }
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(246,245,240,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(246,245,240,0.05) 1px, transparent 1px);
    background-size: 54px 54px;
    -webkit-mask-image: radial-gradient(ellipse at center, black, transparent 78%);
            mask-image: radial-gradient(ellipse at center, black, transparent 78%);
  }
  .row { position: relative; z-index: 2; display: flex; align-items: center; gap: 16px; }
  .eyebrow {
    position: relative; z-index: 2;
    font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 500;
    letter-spacing: 0.34em; text-transform: uppercase; color: #d4ff3d; margin-bottom: 14px;
  }
  .headline {
    font-family: 'Fraunces', Georgia, serif; font-weight: 400; font-size: 40px;
    line-height: 1; letter-spacing: -0.02em; color: #f6f5f0;
  }
  .headline em { font-style: italic; font-weight: 500; color: #d4ff3d; }
  .sub {
    position: relative; z-index: 2;
    font-family: 'JetBrains Mono', monospace; font-size: 13px; letter-spacing: 0.06em;
    color: #a8a8b3; margin-top: 16px;
  }
</style>
</head>
<body>
  <div class="banner">
    <div class="glow"></div>
    <div class="grid"></div>
    <div class="eyebrow">Gamma Tech Group</div>
    <div class="row">
      <svg width="40" height="40" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <rect width="64" height="64" rx="14" fill="#d4ff3d"/>
        <rect x="20" y="18" width="9" height="28" rx="2.5" fill="#07070a"/>
        <rect x="20" y="18" width="25" height="9" rx="2.5" fill="#07070a"/>
      </svg>
      <div class="headline">AI automation, software &amp; <em>custom apps</em>.</div>
    </div>
    <div class="sub">Atlanta, GA · gammatechgroup.com</div>
  </div>
</body>
</html>
