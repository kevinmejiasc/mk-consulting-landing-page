<style>
  :root {
    --bg: #07070a; --bg-elevated: #0d0d12; --bg-card: #111118;
    --ink: #f6f5f0; --ink-dim: #a8a8b3; --ink-faint: #5a5a68;
    --accent: #d4ff3d; --line: rgba(246,245,240,0.08); --line-strong: rgba(246,245,240,0.16);
    --display: 'Fraunces', Georgia, serif; --body: 'Manrope', system-ui, sans-serif; --mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--ink); font-family: var(--body); font-size: 16px; line-height: 1.6; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
  a { color: inherit; }
  .container { max-width: 1080px; margin: 0 auto; padding: 0 24px; }
  @media (max-width: 640px) { .container { padding: 0 20px; } }

  nav { position: sticky; top: 0; backdrop-filter: blur(20px); background: rgba(7,7,10,0.72); border-bottom: 1px solid var(--line); padding: 16px 0; z-index: 100; }
  .nav-inner { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  .logo-mark { height: 48px; width: auto; display: block; transition: opacity 0.2s; }
  .logo-mark:hover { opacity: 0.85; }
  .nav-cta { display: inline-flex; align-items: center; gap: 8px; background: var(--accent); color: #07070a; font-weight: 700; font-size: 14px; padding: 11px 18px; border-radius: 100px; text-decoration: none; white-space: nowrap; transition: opacity 0.2s; }
  .nav-cta:hover { opacity: 0.88; }
  @media (max-width: 640px) { .logo-mark { height: 42px; } .nav-cta { font-size: 13px; padding: 10px 15px; } }

  .blog-head { padding: 64px 0 28px; position: relative; }
  .blog-head::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 70% 60% at 15% 0%, rgba(212,255,61,0.08), transparent 55%); pointer-events: none; }
  .eyebrow { font-family: var(--mono); font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); display: flex; align-items: center; gap: 12px; }
  .eyebrow::before { content: ''; width: 24px; height: 1px; background: var(--accent); }
  h1 { font-family: var(--display); font-weight: 400; font-size: clamp(34px, 5.5vw, 56px); line-height: 1.05; letter-spacing: -0.025em; margin: 18px 0 14px; max-width: 820px; }
  h1 em { font-style: italic; color: var(--accent); }
  .lead { font-size: 18px; color: var(--ink-dim); max-width: 620px; }
  @media (max-width: 640px) { .blog-head { padding: 44px 0 20px; } .lead { font-size: 16px; } }

  .blog-body { padding: 12px 0 90px; min-height: 320px; }
  /* Soro renders a light theme (dark text). Give it a light "paper" surface so it's readable on the dark page. */
  #soro-blog {
    background: #fbfbf9;
    color: #15151c;
    border-radius: 18px;
    padding: clamp(22px, 5vw, 48px);
    box-shadow: 0 24px 60px -24px rgba(0,0,0,0.65);
  }
  #soro-blog a { color: #2f6f2a; }
  @media (max-width: 640px) { #soro-blog { border-radius: 14px; } }

  footer { border-top: 1px solid var(--line); padding: 40px 0; }
  .foot-inner { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 18px; }
  .foot-links a { color: var(--ink-dim); text-decoration: none; font-size: 14px; padding: 7px 0; display: inline-block; }
  .foot-links a + a { margin-left: 22px; }
  .foot-links a:hover { color: var(--accent); }
  .foot-copy { color: var(--ink-faint); font-size: 13px; font-family: var(--mono); }
</style>
</head>
<body>

<nav>
  <div class="container nav-inner">
    <a href="/" aria-label="Gamma Tech Group — home">
      <svg class="logo-mark" viewBox="0 0 198 68" role="img" aria-label="Gamma Tech Group" xmlns="http://www.w3.org/2000/svg">

        <rect x="18" y="20" width="8.5" height="26" rx="2.3" fill="#07070a"/>

        <text x="75" y="41" font-family="Manrope, sans-serif" font-weight="800" font-size="34" letter-spacing="-1.4" fill="#f6f5f0">Gamma</text>
        <text x="77" y="58" font-family="'JetBrains Mono', monospace" font-weight="600" font-size="10" letter-spacing="4.2" fill="#d4ff3d">TECH GROUP</text>
      </svg>
    </a>
    <a class="nav-cta" href="/#book">Free Evaluation →</a>
  </div>
</nav>

<header class="blog-head">

    <div class="eyebrow">The Gamma Blog</div>
    <h1>Insights on automation, AI &amp; <em>building software</em>.</h1>
    <p class="lead">Practical thinking on AI automation, workflow systems, integrations, and custom apps for growing businesses.</p>
  </div>
</header>

<main class="blog-body">
  <div class="container">
    <!-- Soro blog embed -->
    <div id="soro-blog"></div>
    <script src="https://app.trysoro.com/api/embed/44aa89de-e896-4202-9d0f-4c3ea96ea184" defer></script>
  </div>
</main>

<footer>
  <div class="container foot-inner">
    <span class="foot-copy">© 2026 Gamma Tech Group</span>
    <div class="foot-links">
      <a href="/">Home</a>
      <a href="/#services">Services</a>
      <a href="/#faq">FAQ</a>
      <a href="/#book">Free Evaluation</a>
    </div>
  </div>
</footer>

</body>
</html>
